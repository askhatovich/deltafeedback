# Copy to config.ini, then run:
#   ./deltafeedback --register <chatmail-domain>
#   ./deltafeedback --run

# DeltaChat (filled by --register)
addr=
mail_pw=
db=./deltafeedback.db

# Optional display name shown to the admin in their DC client.
displayname=Feedback Test

# Page title (browser tab + h1) per locale. Overrides the default in the
# locale files. Leave a key empty to fall back to the locale file value.
title_ru=Обратная связь
title_en=Contact

# HTTP server
bind=0.0.0.0
port=8080
web_root=./web

# POW
pow_difficulty_bits=18
pow_challenge_ttl_seconds=300

# Generated on first run if empty (32 random bytes hex)
hmac_secret=

# Form anti-bot
min_fill_time_ms=1500
message_max_chars=500
name_max_chars=40

# Cleanup
closed_ticket_retention_days=7
