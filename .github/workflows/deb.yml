name: Build .deb

on:
  push:
    branches: [main]
    tags:     ['v*']
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Debian ${{ matrix.debian }} (${{ matrix.codename }})
    runs-on: ubuntu-latest
    container: debian:${{ matrix.debian }}-slim
    strategy:
      fail-fast: false
      matrix:
        include:
          - debian: '12'
            codename: bookworm
          - debian: '13'
            codename: trixie

    steps:
      - name: Install build dependencies
        run: |
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            build-essential cmake git ca-certificates curl pkg-config \
            libsqlite3-dev libssl-dev libasio-dev \
            dpkg-dev patchelf file

      - name: Install Rust via rustup (apt-shipped cargo is too old for edition 2024)
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs \
              | sh -s -- -y --default-toolchain stable --profile minimal
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - uses: actions/checkout@v4

      - name: Cache libdeltachat artifact
        id: cache-dc
        uses: actions/cache@v4
        with:
          # Cache ONLY the compiled .so + the matching FFI header — the full
          # target/release dir is ~440 MB of intermediate artifacts we don't
          # need at install time. The header path is deterministic per tag.
          path: |
            dc-cache/libdeltachat.so
            dc-cache/deltachat.h
          key: dc-core-v2.49.0-${{ matrix.debian }}-${{ hashFiles('.github/workflows/deb.yml') }}

      - name: Build libdeltachat (cdylib)
        if: steps.cache-dc.outputs.cache-hit != 'true'
        run: |
          # Pin to a tagged release of chatmail/core. Bump deliberately; the
          # FFI is mostly stable across minor versions but check release notes.
          git clone --depth=1 --branch v2.49.0 https://github.com/chatmail/core.git deltachat-core-rust
          (cd deltachat-core-rust && cargo build --release -p deltachat_ffi)
          mkdir -p dc-cache
          cp deltachat-core-rust/target/release/libdeltachat.so dc-cache/
          cp deltachat-core-rust/deltachat-ffi/deltachat.h      dc-cache/

      - name: Restore deltachat-core layout for CMake
        run: |
          # CMakeLists expects ../deltachatbot-cpp/deltachat-core-rust/{target/release,deltachat-ffi}
          # but we override DC_CORE → here we just need a folder that contains
          # both subdirs. Reconstruct minimal layout from the cached files.
          mkdir -p deltachat-core-rust/target/release deltachat-core-rust/deltachat-ffi
          cp dc-cache/libdeltachat.so deltachat-core-rust/target/release/
          cp dc-cache/deltachat.h     deltachat-core-rust/deltachat-ffi/

      - name: Configure & build
        run: |
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DDC_CORE="$PWD/deltachat-core-rust" \
            -DDELTAFEEDBACK_BUILD_TESTS=OFF
          cmake --build build -j"$(nproc)"

      - name: Build .deb
        env:
          DC_LIB: ${{ github.workspace }}/deltachat-core-rust/target/release/libdeltachat.so
          DEBIAN_CODENAME: ${{ matrix.codename }}
        run: ./packaging/build-deb.sh

      - name: Lint package
        run: |
          for d in dist/*.deb; do
            echo "=== $d ==="
            dpkg-deb --info "$d"
            dpkg-deb --contents "$d" | head -40
          done

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: deltafeedback-${{ matrix.codename }}
          path: dist/*.deb
          if-no-files-found: error

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.deb
